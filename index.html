<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background:#000;
}

/* INTRO */
#intro {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#intro.hidden {
  opacity:0;
  pointer-events:none;
  transition:.5s;
}

#count {
  font-size:120px;
  font-weight:300;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* HEADER (SEM MEXER) */
header {
  width:100%;
  height:70vh;
  background:url("file_000000005d24720eb3e4f56b88c9001d.png") center/cover no-repeat;
}

/* TEXTO */
.intro-text {
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(#fbbf24,#fde68a);
}

.intro-text h1 {
  font-size:32px;
  margin-bottom:20px;
}

.intro-text p {
  max-width:500px;
  margin:auto;
  font-size:18px;
}

/* BOTÃO */
.btn {
  margin-top:30px;
  padding:15px 30px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:30px;
  cursor:pointer;
  transition:.3s;
}

.btn:hover {
  transform:scale(1.05);
}

/* TIMELINE */
.timeline-section {
  display:none;
  opacity:0;
  transition:1s;
  padding:80px 0;
  position:relative;

  background:url("ca7c2fa3b52627b2f8a54bd8595c3da9.jpg") center/cover no-repeat;
  background-attachment: fixed;
  min-height:100vh;
}

.timeline-section::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
}

.timeline-section.show {
  display:block;
  opacity:1;
}

.timeline {
  max-width:700px;
  margin:auto;
  position:relative;
  z-index:2;
}

/* ITEM */
.timeline-item {
  padding:80px 0;
  text-align:center;
  opacity:0;
  transform: translateY(60px);
  transition: all 0.8s ease;
}

.timeline-item.active {
  opacity:1;
  transform: translateY(0);
}

/* POLAROID REALISTA */
.polaroid {
  background:#fff;
  padding:12px 12px 40px;
  margin-bottom:20px;
  cursor:pointer;

  box-shadow:
    0 4px 6px rgba(0,0,0,0.1),
    0 15px 35px rgba(0,0,0,0.4);

  transition:0.3s ease;
}

/* leve inclinação */
.timeline-item:nth-child(odd) .polaroid {
  transform: rotate(-1deg);
}

.timeline-item:nth-child(even) .polaroid {
  transform: rotate(1deg);
}

/* hover suave */
.polaroid:hover {
  transform: scale(1.04) rotate(0deg);
  box-shadow:
    0 8px 15px rgba(0,0,0,0.2),
    0 25px 60px rgba(0,0,0,0.6);
}

/* imagem */
.polaroid img {
  width:260px;
  height:260px;
  object-fit:cover;
}

/* TEXTO */
.timeline-title {
  font-family:'Playfair Display';
  font-size:26px;
  color:#fbbf24;
}

.timeline-desc {
  color:#ccc;
  max-width:400px;
  margin:auto;
}

/* OVERLAY */
#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

#overlay.show {
  opacity:1;
  pointer-events:all;
}

#overlay img {
  max-width:90%;
  max-height:80%;
  border:10px solid #fff;
  border-bottom:40px solid #fff;
  transform:rotate(-1deg) scale(0.9);
  animation: zoom 0.4s ease forwards;
}

/* animação ao abrir */
@keyframes zoom {
  to {
    transform: rotate(0deg) scale(1);
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div id="count">1</div>
</div>

<header></header>

<section class="intro-text">
  <h1>Eu quis fazer isso pra você…</h1>
  <p>
    pra te mostrar o quanto cada momento ficou guardado em mim.
    Essa linha do tempo não é só sobre fotos…
    é sobre tudo que você fez por mim,
    e todas as vezes que esteve ao meu lado.
  </p>

  <button class="btn" onclick="mostrarTimeline()">
    Ver nossos momentos
  </button>
</section>

<!-- TIMELINE -->
<section class="timeline-section" id="timeline">
<div class="timeline">

<div class="timeline-item">
  <div class="polaroid" onclick="abrirImagem(this)">
    <img src="20260412_134002.jpg">
  </div>
</div>

<div class="timeline-item">
  <div class="polaroid" onclick="abrirImagem(this)">
    <img src="20260412_133937.jpg">
  </div>
</div>

<div class="timeline-item">
  <div class="polaroid" onclick="abrirImagem(this)">
    <img src="20260412_133949.jpg">
  </div>
</div>

</div>
</section>

<div id="overlay" onclick="fecharImagem()">
  <img id="overlay-img">
</div>

<script>
let count = 1;
const countEl = document.getElementById("count");
const intro = document.getElementById("intro");

const interval = setInterval(()=>{
  count++;
  if(count<=3){
    countEl.innerText = count;
  } else {
    clearInterval(interval);
    setTimeout(()=> intro.classList.add("hidden"),500);
  }
},1000);

function mostrarTimeline(){
  const t = document.getElementById("timeline");
  t.classList.add("show");
  t.scrollIntoView({behavior:"smooth"});
}

window.addEventListener("scroll", ()=>{
  document.querySelectorAll(".timeline-item").forEach(item=>{
    const rect = item.getBoundingClientRect();
    const middle = window.innerHeight/2;

    if(rect.top < middle && rect.bottom > middle){
      document.querySelectorAll(".timeline-item").forEach(i=>i.classList.remove("active"));
      item.classList.add("active");
    }
  });
});

function abrirImagem(el){
  const img = el.querySelector("img").src;
  document.getElementById("overlay-img").src = img;
  document.getElementById("overlay").classList.add("show");
}

function fecharImagem(){
  document.getElementById("overlay").classList.remove("show");
}
</script>

</body>
</html>
