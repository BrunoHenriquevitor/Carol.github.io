<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário 🎉</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#count {
  font-size: 120px;
  font-weight: bold;
  color: #fbbf24;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}

/* HEADER */
header img {
  width: 100%;
  display: block;
}

/* BLOCO */
.pre {
  position: relative;
  overflow: hidden;
}

.pre img {
  width: 100%;
  display: block;
}

.pre::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.4), transparent 60%);
}

/* BOTÃO */
.pre button {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 40px;
  cursor: pointer;
  z-index: 5;
  transition: 0.3s;
}

.pre button:hover {
  background: #fbbf24;
  color: #000;
}

/* TIMELINE */
#timeline-1 {
  display: none;
  opacity: 0;
  transition: 1s;
}

.timeline-container {
  position: relative;
  padding: 150px 0;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.timeline-container::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

.timeline-line {
  position: absolute;
  left: 50%;
  width: 2px;
  top: 0;
  height: 100%;
  background: linear-gradient(to bottom, transparent, #fbbf24, transparent);
  transform: translateX(-50%);
}

.timeline {
  position: relative;
  max-width: 700px;
  margin: auto;
}

.timeline-item {
  padding: 100px 0;
  opacity: 0.3;
  filter: blur(3px);
  transition: 0.5s;
}

.timeline-item--active {
  opacity: 1;
  filter: blur(0);
}

/* POLAROID */
.polaroid {
  background: #fff;
  padding: 6px 6px 18px;
  width: 230px;
  margin: auto;
  cursor: pointer;
  transition: 0.3s;
  position: relative; /* ADICIONADO */
}

.polaroid:hover {
  transform: scale(1.05);
}

/* 🔍 LUPA ADICIONADA */
.polaroid::after {
  content: "🔍";
  position: absolute;
  bottom: 6px;
  right: 8px;
  font-size: 14px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  padding: 3px 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.polaroid img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.timeline__content {
  text-align: center;
  color: #fff;
}

.timeline__content-title {
  font-size: 32px;
  font-family: 'Playfair Display', serif;
}

.timeline__content-desc {
  color: rgba(255,255,255,0.85);
  max-width: 500px;
  margin: auto;
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
  z-index: 9999;
}

#overlay.show {
  opacity: 1;
  pointer-events: all;
}

#overlay img {
  max-width: 85%;
  max-height: 75vh;
  border: 8px solid white;
  border-bottom: 30px solid white;
}

/* FOOTER */
.footer {
  position: relative;
}

.footer img {
  width: 100%;
  display: block;
}
</style>
</head>

<body>
