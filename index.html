<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Momento 💛</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* BANNER */
.banner {
  height: 100vh;
  background: url("sua-imagem.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CAMADA ESCURA */
.overlay {
  background: rgba(0, 0, 0, 0.5);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  color: white;
  max-width: 90%;
}

/* TÍTULO */
.overlay h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

/* SUBTEXTO */
.subtexto {
  font-size: 18px;
  margin-bottom: 15px;
}

/* FRASE EXTRA */
.frase-extra {
  font-size: 17px;
  margin-bottom: 25px;
  color: #ffd54f;
}

/* BOTÃO */
button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #333;
}
</style>

</head>

<body>

<section class="banner">
  <div class="overlay">
    
    <h1>Tenho algo pra te mostrar...</h1>
    
    <p class="subtexto">
      Cada momento com você foi especial 💛
    </p>

    <p class="frase-extra">
      Cada momento aqui mostra o quanto você é essencial na minha vida e como sempre esteve comigo ❤️
    </p>

    <button onclick="alert('Indo para nossa história 💛')">
      Ver nossos momentos
    </button>

  </div>
</section>

</body>
</html>
