<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário 🎉</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* CONTAGEM AMARELA BONITA */
#count {
  font-size: 120px;
  font-weight: 300;
  letter-spacing: -0.05em;
  background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* HEADER */
header img {
  width: 100%;
  display: block;
}

/* BLOCO */
.pre {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(180deg, #fff8e1, #fbc02d);
}

.intro-text {
  max-width: 600px;
  margin: auto;
  font-size: 18px;
  line-height: 1.8;
  color: #333;
  margin-bottom: 40px;
}

button {
  padding: 14px 35px;
  font-size: 15px;
  color: #fff;
  background: #111;
  border: none;
  border-radius: 50px;
  cursor: pointer;
}

/* TIMELINE */
#timeline-1 {
  display: none;
  opacity: 0;
  transition: 1s;
}

.timeline-container {
  position: relative;
  padding: 150px 0 200px 0;
  background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.5)),
                    url("ca7c2fa3b52627b2f8a54bd8595c3da9.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* LINHA BASE */
.timeline-line {
  position: absolute;
  left: 50%;
  top: 0;
  width: 2px;
  height: 0;
  transform: translateX(-50%);
  background: linear-gradient(to bottom, #fbbf24, transparent);
  box-shadow: 0 0 10px rgba(251,191,36,0.6);
  transition: height 0.2s;
}

.timeline {
  max-width: 700px;
  margin: auto;
}

/* ITEM */
.timeline-item {
  padding: 100px 0;
  opacity: 0.3;
  filter: blur(3px);
  transition: 0.5s;
}

.timeline-item--active {
  opacity: 1;
  filter: blur(0);
}

/* POLAROID */
.polaroid {
  background: #fff;
  padding: 8px 8px 20px;
  width: 230px;
  margin: 0 auto 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  cursor: pointer;
  transition: 0.3s;
}

.timeline-item:nth-child(odd) .polaroid {
  transform: rotate(-1deg);
}

.timeline-item:nth-child(even) .polaroid {
  transform: rotate(1deg);
}

.polaroid:hover {
  transform: scale(1.04) rotate(0deg);
}

.polaroid img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* TEXTO */
.timeline__content {
  text-align: center;
  color: #fff;
}

.timeline__content-title {
  font-size: 32px;
  font-family: 'Playfair Display', serif;
}

.timeline__content-desc {
  color: rgba(255,255,255,0.75);
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
  z-index: 9999;
}

#overlay.show {
  opacity: 1;
  pointer-events: all;
}

.overlay-content img {
  max-width: 90%;
  max-height: 80vh;
  border: 8px solid white;
  border-bottom: 30px solid white;
}
</style>
</head>

<body>

<div id="intro"><div id="count">1</div></div>

<header>
  <img src="file_000000005d24720eb3e4f56b88c9001d.png">
</header>

<div class="pre">
  <div class="intro-text">
    <p>
      Eu quis fazer isso pra você…<br>
      pra te mostrar o quanto cada momento ficou guardado em mim.<br><br>
      Essa linha do tempo não é só sobre fotos…<br>
      é sobre tudo que você fez por mim.
    </p>
  </div>
  <button onclick="mostrar()">Começar surpresa</button>
</div>

<div class="timeline-container" id="timeline-1">

  <!-- LINHA -->
  <div class="timeline-line" id="linha"></div>

  <div class="timeline">

    <div class="timeline-item">
      <div class="timeline__content">
        <div class="polaroid" onclick="abrirImagem(this)">
          <img src="20260412_134002.jpg">
        </div>
        <h2 class="timeline__content-title">Antes de tudo</h2>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline__content">
        <div class="polaroid" onclick="abrirImagem(this)">
          <img src="20260412_133937.jpg">
        </div>
        <h2 class="timeline__content-title">Desde o início</h2>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline__content">
        <div class="polaroid" onclick="abrirImagem(this)">
          <img src="20260412_133949.jpg">
        </div>
        <h2 class="timeline__content-title">Por nós dois</h2>
      </div>
    </div>

  </div>
</div>

<div id="overlay" onclick="fecharImagem()">
  <div class="overlay-content">
    <img id="overlay-img">
  </div>
</div>

<script>
// CONTAGEM
let count = 1;
let interval = setInterval(()=>{
  count++;
  document.getElementById('count').innerText = count;
  if(count > 3){
    clearInterval(interval);
    document.getElementById('intro').style.display="none";
  }
},1000);

// MOSTRAR
function mostrar(){
  let t = document.getElementById("timeline-1");
  t.style.display="block";
  setTimeout(()=> t.style.opacity="1",100);
  window.scrollTo({ top: t.offsetTop, behavior: "smooth" });
}

// SCROLL + LINHA PROGRESSO
$(window).scroll(function(){
  let pos = $(this).scrollTop();
  let h = $(window).height();
  let timelineTop = $("#timeline-1").offset().top;
  let timelineHeight = $("#timeline-1").height();

  // PROGRESSO DA LINHA
  let progresso = (pos + h - timelineTop) / timelineHeight;
  progresso = Math.max(0, Math.min(1, progresso));

  $("#linha").css("height", (progresso * 100) + "%");

  $(".timeline-item").each(function(){
    let top = $(this).offset().top;
    if(pos + h/2 >= top){
      $(".timeline-item").removeClass("timeline-item--active");
      $(this).addClass("timeline-item--active");
    }
  });
});

// IMAGEM + FUNDO
let aberta = false;

function abrirImagem(el){
  if(aberta){
    fecharImagem();
    return;
  }

  let src = el.querySelector("img").src;

  document.getElementById("overlay-img").src = src;
  document.getElementById("overlay").classList.add("show");

  document.querySelector(".timeline-container").style.backgroundImage =
    `linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.5)), url(${src})`;

  document.body.style.overflow = "hidden";

  aberta = true;
}

function fecharImagem(){
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow = "auto";
  aberta = false;
}
</script>

</body>
</html>
