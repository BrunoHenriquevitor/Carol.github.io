<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário 🎉</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  z-index: 9999;
}

/* HEADER */
header img {
  width: 100%;
  display: block;
}

/* BLOCO */
.pre {
  text-align: center;
  padding: 50px;
  background: #fbc02d;
}

/* BOTÃO */
button {
  padding: 16px 30px;
  font-size: 16px;
  font-weight: bold;
  color: #333;
  background: linear-gradient(45deg, #ffd54f, #ffca28, #ffc107);
  border: none;
  border-radius: 30px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
button:hover { transform: translateY(-3px); }
button:active { transform: scale(0.95); }

/* TIMELINE */
#timeline-1 {
  display: none;
  opacity: 0;
  transition: 1s;
}

.timeline-container {
  padding: 150px 0 200px 0;
  background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                    url("ca7c2fa3b52627b2f8a54bd8595c3da9.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.timeline {
  max-width: 700px;
  margin: auto;
  display: flex;
  flex-direction: column;
}

.timeline-item {
  padding: 100px 0;
  opacity: 0.3;
  filter: blur(3px);
  transition: 0.5s;
}

.timeline-item--active {
  opacity: 1;
  filter: blur(0);
}

.timeline__content {
  text-align: center;
  color: #fff;
}

/* POLAROID */
.polaroid {
  background: white;
  padding: 10px 10px 25px;
  width: 260px;
  margin: auto;
  transform: rotate(-2deg);
}

.polaroid img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

/* IMG PADRÃO */
.timeline__img {
  width: 260px;
  height: 250px;
  object-fit: cover;
  margin: auto;
  display: block;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro"><div id="count">1</div></div>

<!-- HEADER -->
<header>
  <img src="file_000000005d24720eb3e4f56b88c9001d.png">
</header>

<!-- BOTÃO -->
<div class="pre">
  <h2>Tenho algo pra te mostrar 💛</h2>
  <button onclick="mostrar()">Começar surpresa 🎁</button>
</div>

<!-- TIMELINE -->
<div class="timeline-container" id="timeline-1">
  <div class="timeline">

    <!-- CARD 1 -->
    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="20260412_134002.jpg">
        <p>Antes de tudo… você também era só uma criança 💛</p>
      </div>
    </div>

    <!-- CARD 2 (CORRIGIDO) -->
    <div class="timeline-item">
      <div class="timeline__content">
        <div class="polaroid">
          <img src="20260412_133937.jpg">
        </div>
        <p>
          Desde o início você cuidou de mim…  
          nunca deixou de estar ao meu lado 💛
        </p>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="file_00000000ecc4720ea5cb334a68dc5c84.png">
        <p>
          Você carregava muito nas costas…  
          cuidava de mim e do Matheus 💛
        </p>
      </div>
    </div>

  </div>
</div>

<script>
// INTRO
let count = 1;
let interval = setInterval(()=>{
  count++;
  document.getElementById('count').innerText = count;
  if(count>3){
    clearInterval(interval);
    document.getElementById('intro').style.display="none";
  }
},1000);

// MOSTRAR
function mostrar(){
  let t = document.getElementById("timeline-1");
  t.style.display="block";
  setTimeout(()=> t.style.opacity="1",100);
}

// SCROLL
$(window).scroll(function(){
  let pos = $(this).scrollTop();
  let h = $(window).height();

  $(".timeline-item").each(function(){
    let top = $(this).offset().top;
    if(pos + h/2 >= top){
      $(".timeline-item").removeClass("timeline-item--active");
      $(this).addClass("timeline-item--active");
    }
  });
});
</script>

</body>
</html>
