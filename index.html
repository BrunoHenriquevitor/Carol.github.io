<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

/* CONTAINER */
.timeline{
  max-width:800px;
  margin:50px auto;
  position:relative;
}

/* LINHA */
.timeline::after{
  content:'';
  position:absolute;
  width:4px;
  background:#f1c40f;
  top:0;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
}

/* CARD */
.timeline-item{
  padding:20px;
  position:relative;
  width:50%;
}

.timeline-item.left{
  left:0;
}

.timeline-item.right{
  left:50%;
}

/* CONTEÚDO */
.timeline-content{
  background:#222;
  padding:20px;
  border-radius:10px;
  transition:0.4s;
}

/* IMAGEM */
.timeline-content img{
  width:100%;
  border-radius:10px;
}

/* TÍTULO */
.timeline-content h2{
  margin:10px 0;
}

/* TEXTO */
.timeline-content p{
  opacity:0.8;
}

/* BOLINHA */
.timeline-item::after{
  content:'';
  position:absolute;
  width:15px;
  height:15px;
  background:#f1c40f;
  border-radius:50%;
  top:30px;
}

.timeline-item.left::after{
  right:-8px;
}

.timeline-item.right::after{
  left:-8px;
}

/* HOVER */
.timeline-content:hover{
  transform:scale(1.03);
}

/* ANIMAÇÃO */
.timeline-item{
  opacity:0;
  transform:translateY(50px);
  transition:0.6s;
}

.timeline-item.show{
  opacity:1;
  transform:translateY(0);
}

/* RESPONSIVO */
@media(max-width:768px){
  .timeline::after{
    left:20px;
  }

  .timeline-item{
    width:100%;
    padding-left:50px;
  }

  .timeline-item.right{
    left:0;
  }
}
</style>
</head>

<body>

<div class="timeline">

  <!-- CARD 1 -->
  <div class="timeline-item left">
    <div class="timeline-content">
      <img src="foto1.jpg">
      <h2>2000</h2>
      <p>Um momento especial que marcou o início de tudo.</p>
    </div>
  </div>

  <!-- CARD 2 -->
  <div class="timeline-item right">
    <div class="timeline-content">
      <img src="foto2.jpg">
      <h2>2005</h2>
      <p>Fase cheia de descobertas e aprendizados.</p>
    </div>
  </div>

  <!-- CARD 3 -->
  <div class="timeline-item left">
    <div class="timeline-content">
      <img src="foto3.jpg">
      <h2>2015</h2>
      <p>Momentos inesquecíveis ao lado de quem importa.</p>
    </div>
  </div>

  <!-- CARD 4 -->
  <div class="timeline-item right">
    <div class="timeline-content">
      <img src="foto4.jpg">
      <h2>Hoje</h2>
      <p>E a história continua sendo escrita...</p>
    </div>
  </div>

</div>

<script>
const items = document.querySelectorAll('.timeline-item');

function showItems(){
  const trigger = window.innerHeight * 0.85;

  items.forEach(item=>{
    if(item.getBoundingClientRect().top < trigger){
      item.classList.add('show');
    }
  });
}

window.addEventListener('scroll', showItems);
showItems();
</script>

</body>
</html>
