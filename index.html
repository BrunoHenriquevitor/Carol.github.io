<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário 🎉</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  z-index: 9999;
}

/* HEADER */
header {
  background: linear-gradient(180deg,#ffe082,#fbc02d,#f57f17);
  padding: 20px;
  display: flex;
  justify-content: center;
}

.card {
  max-width: 400px;
  background: #fff;
  padding: 5px;
}

.card img {
  width: 100%;
  display: block;
}

/* BLOCO */
.pre {
  text-align: center;
  padding: 50px;
  background: #fbc02d;
}

button {
  padding: 15px 25px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* TIMELINE */
#timeline-1 {
  display: none;
  opacity: 0;
  transition: 1s;
}

/* FUNDO CORRIGIDO */
.timeline-container {
  position: relative;
  padding: 150px 0 200px 0;

  background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                    url("ca7c2fa3b52627b2f8a54bd8595c3da9.jpg");

  background-size: cover;
  background-position: center;
}

/* 👇 Só aplica efeito parallax no PC */
@media (min-width: 768px) {
  .timeline-container {
    background-attachment: fixed;
  }
}

.timeline {
  max-width: 700px;
  margin: auto;
  display: flex;
  flex-direction: column;
}

.timeline-item {
  padding: 100px 0;
  opacity: 0.3;
  filter: blur(2px);
  transition: 0.5s;
  transform: translateY(80px);
}

.timeline-item--active {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}

.timeline__content {
  text-align: center;
  color: #fff;
}

.timeline__img {
  max-width: 90%;
  display: block;
  margin: auto;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

.timeline__content-title {
  font-size: 40px;
}

.timeline__content-desc {
  color: rgba(255,255,255,0.7);
}
</style>
</head>

<body>

<!-- CONTAGEM -->
<div id="intro"><div id="count">1</div></div>

<!-- HEADER -->
<header>
  <div class="card">
    <img src="arquivo_000000005d24720eb3e4f56b88c9001d.png">
  </div>
</header>

<!-- BLOCO -->
<div class="pre">
  <h2>Tenho algo pra te mostrar 💛</h2>
  <button onclick="mostrar()">Ver nossos momentos</button>
</div>

<!-- TIMELINE -->
<div class="timeline-container" id="timeline-1">

  <div class="timeline">

    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="file_00000000ecc4720ea5cb334a68dc5c84.png">
        <h2 class="timeline__content-title">Começo</h2>
        <p class="timeline__content-desc">Foi aqui que tudo começou 💛</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="file_00000000ecc4720ea5cb334a68dc5c84.png">
        <h2 class="timeline__content-title">Momentos</h2>
        <p class="timeline__content-desc">Momentos especiais juntos</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="file_00000000ecc4720ea5cb334a68dc5c84.png">
        <h2 class="timeline__content-title">Hoje</h2>
        <p class="timeline__content-desc">E hoje estamos aqui 💛</p>
      </div>
    </div>

  </div>
</div>

<script>
// CONTAGEM
let count = 1;
let intro = document.getElementById('intro');
let countEl = document.getElementById('count');

let interval = setInterval(() => {
  count++;
  if(count <= 3){
    countEl.innerText = count;
  } else {
    clearInterval(interval);
    intro.style.display = "none";
  }
},1000);

// BOTÃO
function mostrar(){
  let timeline = document.getElementById("timeline-1");

  timeline.style.display = "block";

  setTimeout(()=>{
    timeline.style.opacity = "1";
  },100);

  window.scrollTo({
    top: timeline.offsetTop,
    behavior: "smooth"
  });
}

// TIMELINE CENTRALIZADA
(function($){
  $.fn.timeline = function(){
    var selectors = {
      id: $(this),
      item: $(this).find(".timeline-item"),
      activeClass: "timeline-item--active"
    };

    selectors.item.eq(0).addClass(selectors.activeClass);

    $(window).scroll(function(){
      var pos = $(this).scrollTop();
      var windowHeight = $(window).height();

      selectors.item.each(function(){
        var itemTop = $(this).offset().top;
        var itemHeight = $(this).height();

        var center = pos + (windowHeight / 2);

        if(center >= itemTop && center <= itemTop + itemHeight){
          selectors.item.removeClass(selectors.activeClass);
          $(this).addClass(selectors.activeClass);
        }
      });
    });
  };
})(jQuery);

$("#timeline-1").timeline();
</script>

</body>
</html>
