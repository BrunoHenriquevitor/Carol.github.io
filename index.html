<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Aniversário 🎉🌻</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #000;
      overflow-x: hidden;
    }

    /* INTRO */
    #intro {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    #intro.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #count {
      font-size: 120px;
      font-weight: bold;
      color: #fbbf24;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* HEADER */
    header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(to bottom, #fbbf24, #fcd34d, #fef3c7);
      padding: 80px 20px;
    }

    /* (RESTANTE DO SEU CSS CONTINUA IGUAL — NÃO ALTEREI NADA) */
  </style>
</head>

<body>

  <!-- INTRO COM CONTAGEM -->
  <div id="intro">
    <div id="count">3</div>
  </div>

  <!-- HEADER -->
  <header>
    <!-- Aqui continua TODO o seu código original -->
  </header>

  <!-- TODO O RESTO DO SEU SITE CONTINUA IGUAL -->
  


  <!-- SCRIPT DA CONTAGEM (ADICIONADO) -->
  <script>
    const countEl = document.getElementById("count");
    const intro = document.getElementById("intro");

    let count = 3;

    countEl.textContent = count;

    const interval = setInterval(() => {
      count--;

      if (count > 0) {
        countEl.textContent = count;
      } else {
        countEl.textContent = "🎉";

        setTimeout(() => {
          intro.classList.add("hidden");
        }, 800);

        clearInterval(interval);
      }
    }, 1000);
  </script>

</body>
</html>
