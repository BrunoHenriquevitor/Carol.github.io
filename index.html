<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surpresa 🎉</title>

<style>
@import url('https://fonts.googleapis.com/css?family=Lato:300italic');

body {
  margin: 0;
  background: #ee9ca7;
  font-family: 'Lato', sans-serif;
}

/* TELA DE ENTRADA */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  z-index: 9999;
}

.fade-out {
  animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER COM IMAGEM RESPONSIVA */
header {
  width: 100%;
  overflow: hidden;
}

header img {
  width: 100%;
  height: auto;
  display: block;
}

</style>
</head>

<body>

<!-- CONTAGEM -->
<div id="intro">
  <div id="count">1</div>
</div>

<!-- HEADER -->
<header>
  <img src="file_00000000ecc4720ea5cb334a68dc5c84.png" alt="Imagem">
</header>

<script>
let count = 1;
const countElement = document.getElementById('count');
const intro = document.getElementById('intro');

let interval = setInterval(() => {
  count++;

  if (count <= 3) {
    countElement.textContent = count;
  } else {
    clearInterval(interval);
    intro.classList.add('fade-out');
  }

}, 1000);
</script>

</body>
</html>
