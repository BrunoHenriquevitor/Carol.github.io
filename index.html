<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline</title>

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css?family=Cardo|Pathway+Gothic+One" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cardo', serif;
  background:#000;
  color:white;
}

/* CONTAINER */
.timeline-container{
  width:100%;
  min-height:100vh;
  background-size:cover;
  background-position:center;
  transition:1s;
  position:relative;
}

/* overlay escuro */
.timeline-container::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

/* HEADER */
.timeline-header{
  text-align:center;
  padding:60px 20px;
  position:relative;
  z-index:2;
}

.timeline-header__title{
  font-family:'Pathway Gothic One', sans-serif;
  font-size:40px;
}

.timeline-header__subtitle{
  opacity:0.7;
}

/* TIMELINE */
.timeline{
  max-width:700px;
  margin:auto;
  padding:50px 0;
  position:relative;
  z-index:2;
}

/* ITEM */
.timeline-item{
  margin-bottom:80px;
  opacity:0.3;
  transition:0.5s;
}

.timeline-item--active{
  opacity:1;
  transform:scale(1.02);
}

/* TEXTO */
.timeline__content-title{
  font-size:40px;
  margin:10px 0;
}

.timeline__content-desc{
  opacity:0.7;
}

/* IMAGEM */
.timeline__img{
  width:100%;
  border-radius:10px;
}

/* RESPONSIVO */
@media(max-width:768px){
  .timeline-header__title{
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="timeline-container" id="timeline-1">

  <div class="timeline-header">
    <h2 class="timeline-header__title">Para minha irmã 🌻</h2>
    <h3 class="timeline-header__subtitle">Nossa história</h3>
  </div>

  <div class="timeline">

    <!-- CARD 1 -->
    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="foto1.jpg">
        <h2 class="timeline__content-title">Infância</h2>
        <p class="timeline__content-desc">
          Desde pequenos sempre juntos.
        </p>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="foto2.jpg">
        <h2 class="timeline__content-title">Momentos</h2>
        <p class="timeline__content-desc">
          Muitas risadas e memórias.
        </p>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="foto3.jpg">
        <h2 class="timeline__content-title">Crescimento</h2>
        <p class="timeline__content-desc">
          Sempre evoluindo juntos.
        </p>
      </div>
    </div>

    <!-- CARD 4 -->
    <div class="timeline-item">
      <div class="timeline__content">
        <img class="timeline__img" src="foto4.jpg">
        <h2 class="timeline__content-title">Hoje</h2>
        <p class="timeline__content-desc">
          E ainda temos muito pela frente.
        </p>
      </div>
    </div>

  </div>
</div>

<script>
const timeline = document.getElementById("timeline-1");
const items = document.querySelectorAll(".timeline-item");

items[0].classList.add("timeline-item--active");
timeline.style.backgroundImage = "url(" + items[0].querySelector("img").src + ")";

window.addEventListener("scroll", () => {
  const pos = window.scrollY;

  items.forEach((item, i) => {
    const min = item.offsetTop;
    const max = min + item.offsetHeight;

    if (pos >= min - 200 && pos < max) {
      items.forEach(el => el.classList.remove("timeline-item--active"));
      item.classList.add("timeline-item--active");

      timeline.style.backgroundImage =
        "url(" + item.querySelector("img").src + ")";
    }
  });
});
</script>

</body>
</html>
