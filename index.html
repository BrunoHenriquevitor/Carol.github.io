<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surpresa 🎉</title>

<style>
@import url('https://fonts.googleapis.com/css?family=Lato:300italic');

body {
  margin: 0;
  background: #ee9ca7;
  font-family: 'Lato', sans-serif;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  z-index: 9999;
}

.fade-out {
  animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER CENTRALIZADO */
header {
  width: 100%;
  height: 250px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

header img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* BOLO 3D */
.scene {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 300px;
  perspective: 800px;
}

.cake3d {
  display: flex;
  transform-style: preserve-3d;
  transform: rotateX(60deg) rotateZ(0deg);
  animation: girar 5s linear infinite;
}

.slice {
  width: 40px;
  height: 100px;
  background: pink;
  margin: 2px;
  transform: translateZ(20px);
  border-radius: 5px;
}

@keyframes girar {
  from { transform: rotateX(60deg) rotateZ(0deg); }
  to { transform: rotateX(60deg) rotateZ(360deg); }
}

/* TEXTO */
.text {
  text-align: center;
  color: #fff;
}

.text h1 {
  font-size: 40px;
  margin: 10px 0;
}

.text p {
  font-size: 25px;
}

</style>
</head>

<body>

<!-- CONTAGEM -->
<div id="intro">
  <div id="count">1</div>
</div>

<!-- HEADER -->
<header>
  <img src="file_00000000ecc4720ea5cb334a68dc5c84.png">
</header>

<!-- BOLO -->
<div id="cake" style="display:none;">

  <div class="scene">
    <div class="cake3d">
      <div class="slice"></div>
      <div class="slice"></div>
      <div class="slice"></div>
      <div class="slice"></div>
      <div class="slice"></div>
      <div class="slice"></div>
    </div>
  </div>

  <div class="text">
    <h1>Happy Birthday!</h1>
    <p>Jonas</p>
  </div>

</div>

<script>
let count = 1;
const countElement = document.getElementById('count');
const intro = document.getElementById('intro');
const cake = document.getElementById('cake');

let interval = setInterval(() => {
  count++;

  if (count <= 3) {
    countElement.textContent = count;
  } else {
    clearInterval(interval);

    intro.classList.add('fade-out');

    setTimeout(() => {
      cake.style.display = 'block';
    }, 1000);
  }

}, 1000);
</script>

</body>
</html>
