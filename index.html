<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surpresa 🎉</title>

<style>
@import url('https://fonts.googleapis.com/css?family=Lato:300italic');

body {
  margin: 0;
  background: #ee9ca7;
  font-family: 'Lato', sans-serif;
}

/* INTRO (CONTAGEM) */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  z-index: 9999;
  flex-direction: column;
}

.fade-out {
  animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER */
header {
  width: 100%;
  height: 250px;
  overflow: hidden;
}

header img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ANIMAÇÃO BOLO */
#cake {
  display: block;
  position: relative;
  margin: 50px auto;
}

/* vela */
.vela {
  width: 10px;
  height: 40px;
  background: white;
  position: absolute;
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 5px;
}

/* chama */
.fogo {
  width: 10px;
  height: 20px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  animation: fogo 0.3s infinite alternate;
}

@keyframes fogo {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.2); }
}

/* texto */
.text {
  text-align: center;
  color: #fff;
}

.text h1 {
  font-size: 40px;
  margin: 10px 0;
}

.text p {
  font-size: 25px;
}
</style>

</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="count">1</div>
</div>

<!-- HEADER -->
<header>
  <img src="arquivo_00000000ecc4720ea5cb334a68dc5c84.png">
</header>

<!-- BOLO -->
<div id="cake" style="display:none;">
  <div style="width:200px;height:100px;background:#fff;margin:auto;border-radius:10px;position:relative;">
    <div class="vela">
      <div class="fogo"></div>
    </div>
  </div>

  <div class="text">
    <h1>Happy Birthday!</h1>
    <p>Jonas</p>
  </div>
</div>

<script>
let count = 1;
const countElement = document.getElementById('count');
const intro = document.getElementById('intro');
const cake = document.getElementById('cake');

let interval = setInterval(() => {
  count++;

  if (count <= 3) {
    countElement.textContent = count;
  } else {
    clearInterval(interval);

    // some com intro
    intro.classList.add('fade-out');

    // mostra animação
    setTimeout(() => {
      cake.style.display = 'block';
    }, 1000);
  }

}, 1000);
</script>

</body>
</html>
