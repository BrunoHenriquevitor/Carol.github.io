<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário 🎉</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1a1a1a;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  z-index: 9999;
}

.fade-out {
  animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* FUNDO COM DEGRADÊ */
.banner {
  background: linear-gradient(180deg, #ffe082 0%, #fbc02d 50%, #f57f17 100%);
  padding: 10px 5px; /* margem bem menor */
  display: flex;
  justify-content: center;
}

/* CARD */
.card {
  width: 95%; /* ocupa quase tudo */
  max-width: 400px;
  background: #ffffff;
  padding: 5px; /* borda mais fina */
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* IMAGEM */
.card img {
  width: 100%;
  display: block;
}

</style></head><body><!-- CONTAGEM --><div id="intro">
  <div id="count">1</div>
</div><!-- HEADER --><div class="banner">
  <div class="card">
    <img src="file_00000000ecc4720ea5cb334a68dc5c84.png">
  </div>
</div><script>
let count = 1;
const countElement = document.getElementById('count');
const intro = document.getElementById('intro');

let interval = setInterval(() => {
  count++;

  if (count <= 3) {
    countElement.textContent = count;
  } else {
    clearInterval(interval);
    intro.classList.add('fade-out');
  }

}, 1000);
</script></body>
</html>
