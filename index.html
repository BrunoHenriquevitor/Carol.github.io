<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline</title>

<style>
html, body, section, article {
  display: grid;
}

html {
  min-height: 100%;
}

body {
  margin: 0;
  background: #121212;
  color: #ededed;
  font-family: Arial, sans-serif;
}

/* CONTAINER */
.timeline {
  place-self: center;
  max-width: 50em;
  padding: 40px;
  gap: 2em;
}

/* CARD */
.timeline article {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5em;
  align-items: center;
  padding-bottom: 1em;
}

/* alterna posição (imagem/texto invertido) */
.timeline article:nth-child(odd) img {
  order: 2;
  justify-self: end;
}

/* separação */
.timeline article:not(:last-child) {
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* caixa de texto */
.timeline__content {
  padding: 1em;
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
}

/* título */
.timeline__content h1 {
  margin: 0 0 10px;
  color: #88d55e;
  font-size: 1.5em;
}

/* data */
.timeline__content time {
  font: 700 2em monospace;
  display: block;
  margin-bottom: 10px;
}

/* texto */
.timeline__content p {
  margin: 0;
  opacity: 0.85;
  line-height: 1.4;
}

/* imagem */
.timeline img {
  width: 100%;
  max-width: 13em;
  border: 2px solid #fff;
  border-radius: 10px;
  object-fit: cover;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .timeline article {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .timeline img {
    justify-self: center !important;
  }
}
</style>
</head>

<body>

<section class="timeline">

  <!-- CARD 1 -->
  <article>
    <div class="timeline__content">
      <time>01</time>
      <h1>Infância</h1>
      <p>Desde o começo você esteve comigo, crescendo juntos em cada momento.</p>
    </div>
    <img src="foto1.jpg" alt="">
  </article>

  <!-- CARD 2 -->
  <article>
    <div class="timeline__content">
      <time>02</time>
      <h1>Momentos</h1>
      <p>Entre risadas, brincadeiras e memórias que nunca vou esquecer.</p>
    </div>
    <img src="foto2.jpg" alt="">
  </article>

  <!-- CARD 3 -->
  <article>
    <div class="timeline__content">
      <time>03</time>
      <h1>Crescimento</h1>
      <p>Cada fase da vida sempre tivemos um ao outro.</p>
    </div>
    <img src="foto3.jpg" alt="">
  </article>

  <!-- CARD 4 -->
  <article>
    <div class="timeline__content">
      <time>04</time>
      <h1>Hoje</h1>
      <p>Obrigado por tudo que você representa pra mim ❤️</p>
    </div>
    <img src="foto4.jpg" alt="">
  </article>

</section>

</body>
</html>
