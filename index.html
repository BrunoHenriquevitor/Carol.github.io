<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário 🎉</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1a1a1a;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  z-index: 9999;
}

.fade-out {
  animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER */
.banner {
  background: linear-gradient(180deg, #ffe082 0%, #fbc02d 50%, #f57f17 100%);
  padding: 10px 5px;
  display: flex;
  justify-content: center;
}

.card {
  width: 95%;
  max-width: 400px;
  background: #ffffff;
  padding: 5px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card img {
  width: 100%;
  display: block;
}

/* BLOCO ANTES DA LINHA DO TEMPO */
.pre-timeline {
  background: linear-gradient(180deg, #fbc02d, #ffe082);
  padding: 60px 20px;
  text-align: center;
  color: #333;
}

.pre-timeline h2 {
  font-size: 28px;
  margin-bottom: 20px;
}

.pre-timeline p {
  font-size: 18px;
  margin-bottom: 30px;
}

/* BOTÃO */
.botao {
  background: #1a1a1a;
  color: #fff;
  padding: 15px 25px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

.botao:hover {
  background: #333;
}

/* LINHA DO TEMPO (ESCONDIDA) */
.timeline {
  display: none;
  padding: 40px 20px;
  background: #fff3c4;
}

.timeline h2 {
  text-align: center;
}

</style></head><body><!-- CONTAGEM --><div id="intro">
  <div id="count">1</div>
</div><!-- HEADER --><div class="banner">
  <div class="card">
    <img src="file_00000000ecc4720ea5cb334a68dc5c84.png">
  </div>
</div><!-- BLOCO ANTES DA TIMELINE --><div class="pre-timeline">
  <h2>Tenho algo pra te mostrar...</h2>
  <p>Cada momento com você foi especial 💛</p>
  <button class="botao" onclick="mostrarTimeline()">Ver nossos momentos</button>
</div><!-- TIMELINE --><div class="timeline" id="timeline">
  <h2>Nossa História</h2>
  <p>(Aqui vão entrar as fotos depois)</p>
</div><script>
let count = 1;
const countElement = document.getElementById('count');
const intro = document.getElementById('intro');

let interval = setInterval(() => {
  count++;

  if (count <= 3) {
    countElement.textContent = count;
  } else {
    clearInterval(interval);
    intro.classList.add('fade-out');
  }

}, 1000);

function mostrarTimeline() {
  document.getElementById('timeline').style.display = 'block';
  window.scrollTo({ top: document.getElementById('timeline').offsetTop, behavior: 'smooth' });
}
</script></body>
</html>
