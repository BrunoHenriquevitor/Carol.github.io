<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surpresa 🎉</title><style>
@import url('https://fonts.googleapis.com/css?family=Lato:300italic');

body {
  margin: 0;
  background: #ee9ca7;
  font-family: 'Lato', sans-serif;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  z-index: 9999;
}

.fade-out {
  animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER */
header {
  width: 100%;
  height: 250px;
  overflow: hidden;
}

header img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CAKE ORIGINAL */
#cake {
  display: block;
  position: relative;
  margin: 50px auto;
}

.text {
  text-align: center;
  color: #fff;
}

.text h1 {
  font-size: 40px;
  margin: 10px 0;
}

.text p {
  font-size: 25px;
}

/* vela animação */
.velas {
  animation: vela 1s infinite alternate;
  transform-origin: bottom;
}

@keyframes vela {
  from { transform: scaleY(1); }
  to { transform: scaleY(1.1); }
}

</style></head>
<body><!-- INTRO --><div id="intro">
  <div id="count">1</div>
</div><!-- HEADER --><header>
  <img src="file_00000000ecc4720ea5cb334a68dc5c84.png">
</header><!-- BOLO SVG (ESTILO DO QUE VOCÊ MANDOU) --><div id="cake" style="display:none;"><svg width="200" height="200" viewBox="0 0 200 200">  <!-- base do bolo -->  <rect x="20" y="100" width="160" height="60" fill="#fff" rx="10" />  <!-- cobertura -->  <rect x="20" y="80" width="160" height="30" fill="#f8c8dc" rx="10" />  <!-- vela -->  <rect class="velas" x="95" y="40" width="10" height="40" fill="#ffffff" rx="5" />  <!-- chama -->  <ellipse cx="100" cy="35" rx="5" ry="10" fill="orange">
    <animate attributeName="ry" values="10;14;10" dur="0.4s" repeatCount="indefinite" />
  </ellipse></svg><div class="text">
  <h1>Happy Birthday!</h1>
  <p>Jonas</p>
</div></div><script>
let count = 1;
const countElement = document.getElementById('count');
const intro = document.getElementById('intro');
const cake = document.getElementById('cake');

let interval = setInterval(() => {
  count++;

  if (count <= 3) {
    countElement.textContent = count;
  } else {
    clearInterval(interval);

    intro.classList.add('fade-out');

    setTimeout(() => {
      cake.style.display = 'block';
    }, 1000);
  }

}, 1000);
</script></body>
</html>
